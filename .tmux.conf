set -g mouse on

set -g mode-keys vi
set -g status-position bottom

bind-key -n 'M-h' select-pane -L
bind-key -n 'M-j' select-pane -D
bind-key -n 'M-k' select-pane -U
bind-key -n 'M-l' select-pane -R

bind '\' split-window -h # Split panes horizontal
bind '-' split-window -v # Split panes vertically

# List of plugins
set -g @plugin 'tmux-plugins/tpm' # main plugin manager
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank' # pressing 'y' on the selected text copies it to the system clipboard
set -g @plugin 'dracula/tmux' # an advanced team for the tmux bar

set -g @dracula-force-gpu "NVIDIA"
set -g @dracula-gpu-vram-used-accuracy ".2f"
set -g @dracula-plugins "network-bandwidth cpu-usage gpu-ram-usage ram-usage battery"
set -g @dracula-gpu-usage true
set -g @dracula-show-flags true
set -g @dracula-show-edge-icons true


# ? vi-mode for easier navigation on the terminal output
bind-key -n 'M-c' copy-mode

setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection     # Begin selection in copy mode.
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle  # Begin selection in copy mode.
bind-key -T copy-mode-vi 'y' send -X copy-selection      # Yank selection in copy mode.


# Initialize TMUX plugin manager (keep this line at the very bottom of .tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
