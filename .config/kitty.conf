# === FONT ===
font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
font_size        13.0
disable_ligatures never

# === CURSOR ===
cursor_shape     beam
cursor_blink     yes
cursor_underline_thickness 2.0
cursor_beam_thickness 1.2

# === COLORS ===
include themes/Dracula.conf  # Or pick your favorite

# === TRANSPARENCY ===
background_opacity 0.90
background_blur 10

# === WINDOW LAYOUT ===
window_margin_width 4
window_padding_width 4

# === SCROLLBACK ===
scrollback_lines 5000
scrollback_pager less --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# === TABS ===
tab_bar_edge top
tab_bar_style powerline
active_tab_font_style bold-italic
inactive_tab_font_style italic

# === BEHAVIOR ===
allow_remote_control yes
enabled_layouts tall:grid, stack, horizontal
sync_to_monitor yes
mouse_hide_wait 2.0

# === PERFORMANCE ===
repaint_delay 5
input_delay 1
enable_audio_bell no

# === URL HANDLING ===
open_url_with default
detect_urls yes
