# ~/.config/kitty/kitty.conf

enabled_layouts splits,tall,stack,grid


# Create splits
map ctrl+shift+enter launch --location=vsplit
map ctrl+shift+-     launch --location=hsplit

# Move focus between splits
map ctrl+h neighboring_window left
map ctrl+l neighboring_window right
map ctrl+k neighboring_window up
map ctrl+j neighboring_window down

# Move the split itself
map ctrl+shift+h move_window left
map ctrl+shift+l move_window right
map ctrl+shift+k move_window up
map ctrl+shift+j move_window down

# Cycle layouts
map ctrl+shift+] next_layout
map ctrl+shift+[ previous_layout

# Go to previous split
map ctrl+p nth_window -1

############################################################
# Font
############################################################

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 14.0
disable_ligatures always
modify_font cell_height 100%
modify_font cell_width 100%
text_composition_strategy legacy

############################################################
# GPU / rendering
############################################################

# Kitty is GPU-accelerated by default.
# These settings keep rendering smooth and responsive.
linux_display_server wayland
repaint_delay 8
input_delay 2
sync_to_monitor yes

############################################################
# Cursor
############################################################

cursor_shape block
cursor_beam_thickness 1.6
cursor_blink_interval 0.5
cursor_stop_blinking_after 15

############################################################
# Window appearance
############################################################

background            #0b0f14
foreground            #d8dee9

selection_background  #2e3440
selection_foreground  #eceff4

background_opacity 0.98
window_padding_width 10

active_border_color   #7aa2f7
inactive_border_color #232a34
bell_border_color     #f7768e

inactive_text_alpha 0.82
confirm_os_window_close 0

############################################################
# Tabs
############################################################

tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_background #11161d

active_tab_background   #7aa2f7
active_tab_foreground   #0b0f14
inactive_tab_background #1a212b
inactive_tab_foreground #9aa5b1

tab_title_template "{index}: {title}"
active_tab_title_template "{index}: {title}"

############################################################
# Scrollback
############################################################

scrollback_lines 100000
wheel_scroll_multiplier 5.0

############################################################
# URLs
############################################################

detect_urls yes
underline_hyperlinks always
open_url_with default

############################################################
# Bell
############################################################

enable_audio_bell no
visual_bell_duration 0.0

############################################################
# Clipboard
############################################################

copy_on_select yes
strip_trailing_spaces smart

############################################################
# Shell integration / usability
############################################################

shell_integration enabled
allow_remote_control yes

############################################################
# Color palette
############################################################

color0  #1d2027
color8  #686f7a

color1  #f7768e
color9  #ff8da1

color2  #9ece6a
color10 #b9f27c

color3  #e0af68
color11 #f5c97a

color4  #7aa2f7
color12 #8db0ff

color5  #bb9af7
color13 #c7a9ff

color6  #7dcfff
color14 #a4daff

color7  #c0caf5
color15 #ffffff

# Short title for the tabs
tab_title_template "{index}: {title.split('/')[-1]}"
active_tab_title_template "{index}: {title.split('/')[-1]}"

# Index-based tab movement
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
